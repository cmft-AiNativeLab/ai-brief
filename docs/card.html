<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI 简讯 · 招商金融科技</title>
<meta property="og:title" content="AI 简讯 · 招商金融科技">
<meta property="og:description" content="每日 AI 行业关键动向 — 战略 / 行业 / 实践 + 大模型能力榜">
<meta property="og:image" content="https://cmft-AiNativeLab.github.io/ai-brief/logo.png">
<meta name="theme-color" content="#c6ccdb">
<style>
  :root{ --ink:#2a3344; --ink2:#4b5670; --grey:#6a7488; --gold:#a98a55; --accent:#5f7295;
    --serif:Georgia,"Songti SC","STSong","SimSun",serif; --sans:"PingFang SC","Microsoft YaHei",sans-serif; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:var(--serif);
    /* 低饱和度柔和色系背景 */
    background:
      radial-gradient(680px 520px at 14% 10%, #c3cde4 0%, transparent 60%),
      radial-gradient(620px 520px at 88% 16%, #d8cdd6 0%, transparent 60%),
      radial-gradient(720px 560px at 82% 92%, #c6d4cd 0%, transparent 60%),
      radial-gradient(600px 520px at 8% 90%, #d8d2c6 0%, transparent 60%),
      linear-gradient(160deg,#c7cedd 0%,#c2c8d6 50%,#c9ccd3 100%);
    min-height:100%; display:flex; align-items:center; justify-content:center; padding:18px; }

  /* 毛玻璃卡片 */
  .card{ position:relative; width:min(94vw,484px); min-height:min(94vw,484px); border-radius:26px;
    overflow:hidden; display:flex; flex-direction:column;
    background:rgba(255,255,255,.16); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,.55);
    box-shadow:0 30px 70px rgba(45,60,95,.30), inset 0 1px 0 rgba(255,255,255,.6); }
  /* 卡片内的低饱和度光晕（供毛玻璃虚化） */
  .bg{ position:absolute; inset:-12%; z-index:0; filter:blur(10px);
    background:
      radial-gradient(closest-side, rgba(150,168,210,.55), transparent) 0% 0%/60% 58% no-repeat,
      radial-gradient(closest-side, rgba(196,170,190,.50), transparent) 100% 6%/58% 56% no-repeat,
      radial-gradient(closest-side, rgba(160,190,172,.48), transparent) 92% 104%/60% 58% no-repeat,
      radial-gradient(closest-side, rgba(206,188,158,.45), transparent) -4% 100%/56% 56% no-repeat; }

  /* 头部：毛玻璃横幅（左侧标题 + 右上 logo） */
  .head{ position:relative; z-index:1; flex-shrink:0; padding:20px 22px 17px; color:var(--ink); overflow:hidden;
    background:linear-gradient(135deg, rgba(255,255,255,.34), rgba(214,222,238,.20));
    backdrop-filter:blur(16px) saturate(118%); -webkit-backdrop-filter:blur(16px) saturate(118%);
    border-bottom:1px solid rgba(255,255,255,.45); }
  .logo-wrap{ position:absolute; top:18px; right:16px; z-index:2; border-radius:10px; padding:5px 8px;
    background:rgba(255,255,255,.72); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.8); box-shadow:0 6px 18px rgba(40,55,90,.18); }
  .logo{ height:28px; width:auto; display:block; }
  h1{ font-size:35px; font-weight:700; letter-spacing:3px; color:var(--ink); }
  .sub{ font-size:12px; color:var(--ink2); margin-top:10px; line-height:1.65; font-family:var(--sans); }

  /* 主体：两栏目 + 二维码 */
  .body{ position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:16px 20px 15px; }
  .entries{ display:flex; flex-direction:column; gap:12px; }
  .entry{ display:flex; align-items:center; gap:13px; text-decoration:none; color:inherit;
    border:1px solid rgba(255,255,255,.55); border-radius:14px; padding:13px 15px;
    background:rgba(255,255,255,.40); backdrop-filter:blur(10px) saturate(120%); -webkit-backdrop-filter:blur(10px) saturate(120%);
    box-shadow:0 6px 16px rgba(45,60,95,.10), inset 0 1px 0 rgba(255,255,255,.6); transition:.18s; }
  .entry:hover,.entry:active{ background:rgba(255,255,255,.58); border-color:rgba(255,255,255,.85);
    box-shadow:0 10px 24px rgba(45,60,95,.16); transform:translateY(-1px); }
  .ico{ width:42px; height:42px; flex-shrink:0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:21px;
    border:1px solid rgba(255,255,255,.6); box-shadow:inset 0 1px 0 rgba(255,255,255,.5); }
  .ico.b{ background:rgba(150,168,210,.42); }
  .ico.n{ background:rgba(172,182,202,.42); }
  .etx{ flex:1; } .etx .t{ font-size:17px; font-weight:700; color:var(--ink); }
  .etx .d{ font-size:12px; color:var(--grey); margin-top:3px; font-family:var(--sans); }
  .arr{ color:#97a2ba; font-size:21px; }

  /* 二维码：底色透明，与卡片背景融为一体 */
  .qr-block{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; }
  .qr{ width:126px; height:126px; display:block; filter:drop-shadow(0 2px 6px rgba(40,55,90,.14)); }
  .qr-cap{ font-size:12.5px; font-weight:700; color:var(--ink2); font-family:var(--sans); letter-spacing:.3px; }

  /* 底部出品信息 */
  .foot{ flex-shrink:0; text-align:center; font-size:10px; color:var(--grey); font-family:var(--sans); line-height:1.55;
    border-top:1px solid rgba(255,255,255,.42); padding-top:11px; }
  .foot b{ color:var(--gold); font-weight:700; }
</style>
</head>
<body>
  <div class="card">
    <div class="bg"></div>
    <div class="head">
      <div class="logo-wrap"><img src="logo.png" alt="招商金融科技 · CMG Fintech" class="logo"></div>
      <h1>AI 简讯</h1>
      <div class="sub">每日 AI 行业关键动向 · 每日 7:30 自动更新<br>战略动向 · 行业影响 · 管理实践 ＋ 大模型能力榜</div>
    </div>
    <div class="body">
      <div class="entries">
        <a class="entry" href="./">
          <div class="ico b">📰</div>
          <div class="etx"><div class="t">今日最新一期</div><div class="d">当天精选 12 条 ＋ 实时榜单</div></div>
          <div class="arr">›</div>
        </a>
        <a class="entry" href="./archive">
          <div class="ico n">🗂️</div>
          <div class="etx"><div class="t">往期资讯内容</div><div class="d">按日期翻阅历史每一期</div></div>
          <div class="arr">›</div>
        </a>
      </div>
      <div class="qr-block">
        <img src="qr.png" alt="扫码访问 AI 简讯" class="qr">
        <div class="qr-cap">📱 微信扫码 · 直达最新一期</div>
      </div>
      <div class="foot">数据来源 量子位 / 新智元 / 36氪 / 华尔街见闻 等 ＋ artificialanalysis.ai · 由 <b>招商金融科技</b> 出品</div>
    </div>
  </div>
</body>
</html>
