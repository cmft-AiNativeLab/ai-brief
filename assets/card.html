<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI 简讯 · 招商金科</title>
<meta property="og:title" content="AI 简讯 · 招商金科">
<meta property="og:description" content="每日 AI 行业关键动向 — 战略 / 行业 / 实践 + 大模型能力榜">
<meta property="og:image" content="https://cmft-AiNativeLab.github.io/ai-brief/logo.png">
<meta name="theme-color" content="#f3e5c5">
<style>
  :root{
    --bg:#f3e5c5;            /* 米杏纸感 */
    --bg-soft:#f8eed3;
    --gold:#b8862b;          /* 深金 */
    --gold-soft:#d4a373;     /* 浅金 */
    --ink:#2f261a;           /* 暖墨 */
    --ink2:#5a4a30;
    --grey:#8a7654;
    --pill:#231c10;          /* 来源胶囊深底 */
    --pill-ink:#d4b478;
    --serif:"Source Han Serif SC","Noto Serif SC","Songti SC","STSong",Georgia,serif;
    --sans:"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:var(--serif);
    background:linear-gradient(160deg,#eddcb8 0%,#f4e8c8 35%,#ecdbb6 100%);
    min-height:100%; display:flex; align-items:center; justify-content:center; padding:18px; }

  /* 主卡：纸质米杏 + 大圆角 + 柔和投影
     width 用 100% 而非 94vw，可正确受 body padding 约束，避免窄屏溢出右侧 */
  .card{ position:relative; width:min(100%,520px); aspect-ratio:4/5;
    border-radius:28px; overflow:hidden;
    background:linear-gradient(168deg,var(--bg-soft) 0%,var(--bg) 60%,#eed9b1 100%);
    box-shadow:0 30px 70px rgba(80,55,15,.28), inset 0 1px 0 rgba(255,255,255,.5);
    padding:34px 30px 22px; display:flex; flex-direction:column; }

  /* 右上角放射金光（仿参考图） */
  .card::before{ content:''; position:absolute; top:-160px; right:-160px;
    width:480px; height:480px; border-radius:50%;
    background:
      radial-gradient(circle at center,
        rgba(212,163,115,.32) 0%,
        rgba(184,134,43,.18) 28%,
        rgba(184,134,43,.08) 55%,
        transparent 78%);
    pointer-events:none; }
  /* 同心圆细线点缀 */
  .card::after{ content:''; position:absolute; top:-188px; right:-188px;
    width:540px; height:540px; border-radius:50%;
    border:1px solid rgba(184,134,43,.18); pointer-events:none; }

  /* Row 1：标题 + 日期 */
  .row-1{ position:relative; z-index:1; display:flex; justify-content:space-between; align-items:baseline; }
  .title{ font-size:32px; font-weight:700; letter-spacing:3px; color:var(--ink); }
  .date{ font-family:Georgia,serif; font-size:13.5px; color:var(--gold); letter-spacing:2.5px; font-weight:700; }

  /* Row 2：副标 + 出品方 */
  .row-2{ position:relative; z-index:1; margin-top:10px; padding-bottom:16px;
    border-bottom:1px dashed rgba(184,134,43,.45);
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--sans); font-size:12px; color:var(--ink2); }
  .tagline{ letter-spacing:.4px; }
  .by{ color:var(--gold); font-weight:700; letter-spacing:.5px; }

  /* Row 3：今日爆款 + 引用 + 来源胶囊 */
  .row-3{ position:relative; z-index:1; margin-top:22px; flex:1; display:flex; flex-direction:column; min-height:0; }
  .label{ font-family:var(--sans); font-size:11.5px; font-weight:800;
    letter-spacing:5px; color:var(--gold); margin-bottom:10px; }
  .hot-title{ font-family:var(--sans); font-weight:800; font-size:16.5px;
    line-height:1.55; color:var(--ink); margin-bottom:14px; }
  .quote{ position:relative; padding:2px 0 0 32px; }
  .quote::before{ content:'\201C'; position:absolute; left:-4px; top:-22px;
    font-family:Georgia,serif; font-size:74px; font-weight:700; color:var(--gold-soft); line-height:1; }
  .quote p{ font-family:var(--serif); font-size:17px; font-weight:700;
    line-height:1.7; color:var(--ink); letter-spacing:.4px; }
  .source-pill{ align-self:flex-start; margin-top:14px;
    background:var(--pill); color:var(--pill-ink);
    padding:5px 13px; border-radius:18px;
    font-family:var(--sans); font-size:11px; letter-spacing:.4px; }

  /* Row 4：两个二维码 */
  .row-4{ position:relative; z-index:1; margin-top:18px; display:flex; gap:14px; }
  .qr-cell{ flex:1; text-decoration:none; color:inherit;
    border:1px solid rgba(184,134,43,.32); border-radius:14px;
    background:rgba(255,250,232,.6); padding:11px 8px 9px; text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6); transition:.18s; }
  .qr-cell:hover{ background:rgba(255,250,232,.85); border-color:rgba(184,134,43,.6); }
  .qr-cell img{ width:100%; max-width:108px; height:auto; display:block; margin:0 auto;
    filter:drop-shadow(0 2px 4px rgba(80,55,15,.10)); }
  .qr-label{ margin-top:7px; font-family:var(--sans); font-size:12px; font-weight:700;
    color:var(--ink); letter-spacing:.4px; }
  .qr-sub{ font-family:var(--sans); font-size:10px; color:var(--grey); margin-top:2px; }

  /* Row 5：logo 底部居中 */
  .row-5{ position:relative; z-index:1; margin-top:16px; display:flex; justify-content:center; }
  .foot-logo{ height:24px; width:auto; opacity:.95;
    filter:drop-shadow(0 2px 4px rgba(80,55,15,.12)); }

  /* —— 窄屏适配：手机端（≤460px）字号收紧 + 副标换行，避免内容被 overflow:hidden 裁掉 —— */
  @media (max-width:460px){
    .card{ padding:26px 22px 18px; }
    .title{ font-size:26px; letter-spacing:2px; }
    .date{ font-size:12px; letter-spacing:1.5px; }
    .row-2{ flex-direction:column; align-items:flex-start; gap:4px; font-size:11.5px; padding-bottom:12px; }
    .label{ font-size:11px; letter-spacing:4px; margin-bottom:8px; }
    .hot-title{ font-size:15px; margin-bottom:10px; }
    .quote{ padding-left:24px; }
    .quote::before{ font-size:60px; top:-18px; }
    .quote p{ font-size:14.5px; line-height:1.65; }
    .source-pill{ font-size:10.5px; padding:4px 11px; margin-top:10px; }
    .row-4{ gap:10px; margin-top:14px; }
    .qr-cell{ padding:9px 6px 7px; }
    .qr-cell img{ max-width:92px; }
    .qr-label{ font-size:11px; }
    .qr-sub{ font-size:9.5px; }
    .row-5{ margin-top:12px; }
    .foot-logo{ height:20px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="row-1">
      <div class="title">AI 简讯</div>
      <div class="date">{{DATE_DOT}}</div>
    </div>
    <div class="row-2">
      <div class="tagline">每日 AI 行业关键动向 · 战略 / 行业 / 实践</div>
      <div class="by">由 招商金科 出品</div>
    </div>
    <div class="row-3">
      <div class="label">今 日 爆 款</div>
      <div class="hot-title">{{HOT_HEADLINE}}</div>
      <div class="quote">
        <p>{{HOT_QUOTE}}</p>
      </div>
      <div class="source-pill">源：{{HOT_SOURCE}} · {{HOT_STARS}}</div>
    </div>
    <div class="row-4">
      <a class="qr-cell" href="./">
        <img src="qr.png" alt="今日资讯">
        <div class="qr-label">📰 今日资讯</div>
        <div class="qr-sub">扫码进入最新一期</div>
      </a>
      <a class="qr-cell" href="./download/">
        <img src="qr-download.png" alt="往期下载">
        <div class="qr-label">📥 往期下载</div>
        <div class="qr-sub">扫码进入往期合集</div>
      </a>
    </div>
    <div class="row-5">
      <img class="foot-logo" src="logo.png" alt="招商金融科技 · CMG Fintech">
    </div>
  </div>
</body>
</html>
